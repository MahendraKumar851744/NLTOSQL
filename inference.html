<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recursive Extraction Engine</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        ::-webkit-scrollbar { width: 8px; height: 8px; }
        ::-webkit-scrollbar-track { background: #f1f5f9; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 4px; }
        ::-webkit-scrollbar-thumb:hover { background: #94a3b8; }
        .spinner { border: 3px solid #f3f3f3; border-top: 3px solid #3b82f6; border-radius: 50%; width: 24px; height: 24px; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
    </style>
</head>
<body class="bg-slate-50 text-slate-800 h-screen flex overflow-hidden font-sans">

    <aside class="w-80 bg-white border-r border-slate-200 flex flex-col hidden md:flex">
        <div class="p-6 border-b border-slate-200">
            <h1 class="text-xl font-bold text-slate-800 flex items-center gap-2">
                <svg class="w-6 h-6 text-blue-600" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 10V3L4 14h7v7l9-11h-7z"></path></svg>
                Extraction API
            </h1>
        </div>
        <div class="p-4 flex-1 overflow-y-auto" id="history-container">
            <h2 class="text-xs font-semibold text-slate-400 uppercase tracking-wider mb-4">Previous Queries</h2>
            <ul id="history-list" class="space-y-2">
                </ul>
        </div>
    </aside>

    <main class="flex-1 flex flex-col h-full relative">
        
        <div class="flex-1 overflow-y-auto p-8" id="main-view">
            <div class="max-w-5xl mx-auto flex flex-col justify-end min-h-full pb-32">
                
                <div id="welcome-state" class="text-center my-auto">
                    <h2 class="text-3xl font-bold text-slate-700 mb-4">What data are you looking for?</h2>
                    <p class="text-slate-500">Ask a question to trigger the recursive LLM extraction.</p>
                </div>

                <div id="result-container" class="hidden space-y-6 w-full">
                    <div class="bg-white rounded-2xl shadow-sm border border-slate-200 p-6">
                        <h3 class="text-lg font-semibold text-slate-800 mb-2 border-b pb-2" id="res-question"></h3>
                        
                        <div class="flex flex-wrap gap-3 my-4" id="res-summary">
                            </div>

                        <div class="overflow-x-auto rounded-lg border border-slate-200 mt-6">
                            <table class="min-w-full divide-y divide-slate-200 text-sm">
                                <thead class="bg-slate-50 text-slate-600">
                                    <tr>
                                        <th class="px-4 py-3 text-left font-medium">Field</th>
                                        <th class="px-4 py-3 text-left font-medium">Table</th>
                                        <th class="px-4 py-3 text-left font-medium">Column</th>
                                        <th class="px-4 py-3 text-left font-medium">Type</th>
                                    </tr>
                                </thead>
                                <tbody id="res-table-body" class="divide-y divide-slate-200 bg-white text-slate-700">
                                    </tbody>
                            </table>
                        </div>
                        <div id="empty-state" class="hidden mt-6 text-center text-slate-500 py-8 bg-slate-50 rounded-lg border border-dashed border-slate-300">
                            No matching items found.
                        </div>
                    </div>
                </div>

            </div>
        </div>

        <div class="absolute bottom-0 left-0 w-full bg-gradient-to-t from-slate-50 via-slate-50 pt-10 pb-8 px-8">
            <div class="max-w-3xl mx-auto">
                <form id="query-form" class="relative flex items-center">
                    <input 
                        type="text" 
                        id="question-input" 
                        placeholder="Enter your question here..." 
                        class="w-full pl-6 pr-16 py-4 rounded-full border border-slate-300 shadow-sm focus:outline-none focus:ring-2 focus:ring-blue-500 focus:border-blue-500 text-slate-700 text-lg transition-all"
                        required
                    >
                    <button type="submit" id="submit-btn" class="absolute right-2 p-2 bg-blue-600 text-white rounded-full hover:bg-blue-700 transition-colors flex items-center justify-center w-10 h-10">
                        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M14 5l7 7m0 0l-7 7m7-7H3"></path></svg>
                    </button>
                    <div id="loading-spinner" class="absolute right-3 hidden spinner"></div>
                </form>
            </div>
        </div>
    </main>

    <script>
        const form = document.getElementById('query-form');
        const input = document.getElementById('question-input');
        const submitBtn = document.getElementById('submit-btn');
        const spinner = document.getElementById('loading-spinner');
        
        const welcomeState = document.getElementById('welcome-state');
        const resultContainer = document.getElementById('result-container');
        const historyList = document.getElementById('history-list');

        // Fetch history on load
        async function loadHistory() {
            try {
                const res = await fetch('/api/history');
                const history = await res.json();
                history.forEach(item => addHistoryToSidebar(item));
            } catch (err) {
                console.error("Failed to load history", err);
            }
        }

        function addHistoryToSidebar(data) {
            const li = document.createElement('li');
            li.className = "p-3 rounded-lg hover:bg-slate-100 cursor-pointer text-sm text-slate-700 truncate border border-transparent hover:border-slate-200 transition-colors";
            li.textContent = data.question;
            li.onclick = () => renderResult(data);
            historyList.prepend(li);
        }

        function renderResult(data) {
            welcomeState.classList.add('hidden');
            resultContainer.classList.remove('hidden');
            
            // Set question
            document.getElementById('res-question').textContent = `Q: ${data.question}`;

            // Render Summary
            const summaryDiv = document.getElementById('res-summary');
            summaryDiv.innerHTML = '';
            if (data.summary) {
                const metrics = [
                    { label: 'Time', val: `${data.summary.time_seconds}s`, color: 'bg-indigo-100 text-indigo-700' },
                    { label: 'Keywords', val: data.summary.total_keywords, color: 'bg-blue-100 text-blue-700' },
                    { label: 'API Calls', val: data.summary.api_requests, color: 'bg-emerald-100 text-emerald-700' },
                    { label: 'Sent Data', val: data.summary.sent_to_api, color: 'bg-amber-100 text-amber-700' },
                    { label: 'Filtered', val: data.summary.final_filtered, color: 'bg-purple-100 text-purple-700' }
                ];
                
                metrics.forEach(m => {
                    const span = document.createElement('span');
                    span.className = `px-3 py-1 rounded-full text-xs font-semibold ${m.color}`;
                    span.textContent = `${m.label}: ${m.val}`;
                    summaryDiv.appendChild(span);
                });
            }

            // Render Table
            const tbody = document.getElementById('res-table-body');
            const emptyState = document.getElementById('empty-state');
            tbody.innerHTML = '';

            if (data.matched_items && data.matched_items.length > 0) {
                emptyState.classList.add('hidden');
                data.matched_items.forEach(item => {
                    const tr = document.createElement('tr');
                    tr.innerHTML = `
                        <td class="px-4 py-3 whitespace-nowrap font-medium text-slate-900">${item.field || '-'}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-slate-500">${item.table || '-'}</td>
                        <td class="px-4 py-3 whitespace-nowrap text-slate-500 font-mono text-xs">${item.column || '-'}</td>
                        <td class="px-4 py-3 whitespace-nowrap">
                            <span class="px-2 py-1 rounded text-xs font-medium ${item.field_type === 'node' ? 'bg-orange-100 text-orange-700' : 'bg-sky-100 text-sky-700'}">
                                ${item.field_type || 'leaf'}
                            </span>
                        </td>
                    `;
                    tbody.appendChild(tr);
                });
            } else {
                emptyState.classList.remove('hidden');
            }

            // Scroll to top of results
            document.getElementById('main-view').scrollTop = 0;
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const question = input.value.trim();
            if (!question) return;

            // UI Loading state
            submitBtn.classList.add('hidden');
            spinner.classList.remove('hidden');
            input.disabled = true;

            try {
                const response = await fetch('/api/extract', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ question })
                });
                
                const data = await response.json();
                
                renderResult(data);
                addHistoryToSidebar(data);
                
                input.value = ''; // clear input
            } catch (err) {
                alert("An error occurred. Make sure your backend and vLLM server are running.");
                console.error(err);
            } finally {
                // Restore UI
                submitBtn.classList.remove('hidden');
                spinner.classList.add('hidden');
                input.disabled = false;
                input.focus();
            }
        });

        // Initialize
        loadHistory();
    </script>
</body>
</html>
